name: "NixOS CI"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v27
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          access-tokens = github.com=${{ secrets.GH_PAT }}

    - uses: cachix/cachix-action@v16
      with:
        name: kleinbem
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

    - name: Set up dummy secrets
      run: |
        mkdir -p /tmp/dummy-secrets
        echo "{}" > /tmp/dummy-secrets/secrets.yaml

    - name: Set Nix input overrides
      run: |
        OVERRIDES=""
        OVERRIDES="$OVERRIDES --override-input nix-secrets /tmp/dummy-secrets"
        OVERRIDES="$OVERRIDES --override-input nix-devshells github:kleinbem/nix-devshells"
        OVERRIDES="$OVERRIDES --override-input nix-hardware github:kleinbem/nix-hardware"
        OVERRIDES="$OVERRIDES --override-input nix-hardware/nix-devshells github:kleinbem/nix-devshells"
        OVERRIDES="$OVERRIDES --override-input nix-packages github:kleinbem/nix-packages"
        OVERRIDES="$OVERRIDES --override-input nix-packages/nix-devshells github:kleinbem/nix-devshells"
        OVERRIDES="$OVERRIDES --override-input nix-presets github:kleinbem/nix-presets"
        OVERRIDES="$OVERRIDES --override-input nix-presets/nix-devshells github:kleinbem/nix-devshells"
        OVERRIDES="$OVERRIDES --override-input nix-presets/nix-packages github:kleinbem/nix-packages"
        OVERRIDES="$OVERRIDES --override-input nix-presets/nix-packages/nix-devshells github:kleinbem/nix-devshells"
        OVERRIDES="$OVERRIDES --override-input nix-templates github:kleinbem/nix-templates"
        OVERRIDES="$OVERRIDES --override-input nix-templates/nix-devshells github:kleinbem/nix-devshells"
        echo "NIX_OVERRIDES=$OVERRIDES" >> "$GITHUB_ENV"

    - name: Check Flake structure
      run: nix eval .#nixosConfigurations $NIX_OVERRIDES --apply builtins.attrNames

    - name: Check Formatting
      run: nix fmt $NIX_OVERRIDES -- --fail-on-change
