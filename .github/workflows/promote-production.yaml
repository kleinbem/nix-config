name: "Promote → production"

# Pull-based fleet deploy: hosts run my.deploy.autoUpgrade which polls the
# `production` git tag. This workflow advances that tag to the current main
# SHA after a successful build-all, gating deploys behind CI green.
#
# Triggers:
# - workflow_run: automatic on successful Build & Cache All (Fast)
# - workflow_dispatch: manual override (e.g. promote without waiting)
#
# A failed build-all does NOT advance the tag — hosts keep running the last
# known-good revision until the next green run.

on:
  workflow_run:
    workflows: ["Build & Cache All (Fast)"]
    branches: [main]
    types:
      - completed
  workflow_dispatch:
    inputs:
      sha:
        description: "Override SHA to promote (default: latest main)"
        required: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Device-faithful completeness gate. A host that opts into
  # my.deploy.autoUpgrade pulls the `production` tag and switches — and MUST
  # never compile on-device (RPi hosts carry the custom linux-rpi kernel, which
  # is absent from cache.nixos.org). build-all already builds + pushes those
  # toplevels, but a push can be partial (network blip mid-NAR, a path
  # nix-fast-build didn't push, Attic GC racing). This job proves, from a clean
  # store using EXACTLY the substituters a device trusts (cache.nixos.org +
  # cachix mirrors + private Attic), that every deployed closure is fully
  # fetchable. If anything "will be built", we refuse to advance the tag — hosts
  # keep running the last fully-cached revision instead of risking an on-device
  # build. This is what makes the setup-only Attic push (skip-push) safe: Attic
  # holds only non-upstream paths, and this gate verifies the union still covers
  # the whole closure.
  verify-cache:
    name: "Verify closures are fully cached"
    # Run natively on aarch64 — the pull-deploy edge hosts are all aarch64, so a
    # native runner sidesteps any cross-arch dry-run eval quirks.
    runs-on: ubuntu-24.04-arm
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout promotion-candidate SHA
        uses: actions/checkout@v6.0.2
        with:
          # Check the exact commit build-all built, not whatever main is now.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Nix fleet setup (pull-only)
        # enable-cache wires up NetBird + Attic as a SUBSTITUTER with the pull
        # token (skip-push keeps it read-only) and sets NIX_OVERRIDES to the same
        # github: sibling refs build-all used — so the closure we evaluate here
        # matches the one that was cached.
        uses: ./.github/actions/nix-fleet-setup
        with:
          enable-cache: 'true'
          # Prefer the ephemeral key (auto-expiring runner peers); fall back to
          # the persistent key until the ephemeral secret is distributed.
          netbird-setup-key: ${{ secrets.NETBIRD_SETUP_KEY_EPHEMERAL || secrets.NETBIRD_SETUP_KEY }}
          attic-token: ${{ secrets.ATTIC_PUSH_TOKEN }}
          netbird: 'true'
          free-disk-space: 'false'

      - name: Assert no deployed host would build
        run: |
          set -euo pipefail
          # The hosts that pull `production` via my.deploy.autoUpgrade and must
          # never build on-device. Mirrors build-all's aarch64 toplevel targets.
          # Excluded (deliberately, same as build-all): nixos-nvme (IS the cache
          # host — builds locally, never pulls), orin-nano + routers (build
          # on-device by design). Edit this list as hosts opt into pull-deploy.
          HOSTS=(hass-pi core-pi)
          fail=0
          for h in "${HOSTS[@]}"; do
            echo "::group::dry-run $h"
            target=".#nixosConfigurations.$h.config.system.build.toplevel"
            # `nix build --dry-run` NEVER builds; it queries every substituter
            # for each closure path and classifies it as "to fetch" (cached) or
            # "to build" (missing everywhere we trust). The runner's store is
            # clean, so this faithfully simulates a fresh device.
            if ! out="$(nix build --dry-run "$target" $NIX_OVERRIDES 2>&1)"; then
              echo "$out"
              echo "::error::$h: dry-run eval failed — cannot verify cache, refusing to promote."
              fail=1
              echo "::endgroup::"
              continue
            fi
            echo "$out"
            if echo "$out" | grep -qiE 'will be built'; then
              echo "::error::$h closure is NOT fully cached — a device would compile on-device. Blocking promotion."
              fail=1
            else
              echo "✅ $h: fully cached (fetch-only)."
            fi
            echo "::endgroup::"
          done
          exit $fail

      # Container manifest: the standalone container updater on every host
      # (nixos-nvme, core-pi, hass-pi) is eval-free — it fetches this JSON and
      # substitutes the listed store path. Generate it here from the SAME SHA
      # being promoted, and apply the same device-faithful gate as hosts: a
      # container path that isn't fully cached is DROPPED from the manifest
      # (devices then keep serving the previous closure) rather than published
      # as a path an RPi would have to compile. Manifest generation is
      # best-effort overall: it must never block host promotion.
      - name: Generate container manifest
        id: manifest
        continue-on-error: true
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo '{}' > /tmp/systems.json
          for entry in "x86_64-linux:container-factory" "aarch64-linux:container-factory-aarch64"; do
            sys="${entry%%:*}"; factory="${entry##*:}"
            echo "::group::manifest $sys ($factory)"
            nix eval --json \
              ".#nixosConfigurations.$factory.config.containers" \
              --apply 'cs: builtins.mapAttrs (n: c: c.path) cs' \
              $NIX_OVERRIDES > "/tmp/paths-$sys.json"
            # Device-faithful filter: same dry-run gate as hosts, per container.
            # Checks the FULL closure (root + deps) against the substituters a
            # device trusts; repeated evals share the flake eval cache.
            echo '{}' > "/tmp/ok-$sys.json"
            for name in $(jq -r 'keys[]' "/tmp/paths-$sys.json"); do
              path=$(jq -r --arg n "$name" '.[$n]' "/tmp/paths-$sys.json")
              attr=".#nixosConfigurations.$factory.config.containers.\"$name\".path"
              if out=$(nix build --dry-run "$attr" $NIX_OVERRIDES --option substituters "https://cache.nixos.org https://cache.kleinbem.dev/system" 2>&1) && ! echo "$out" | grep -qiE 'will be built'; then
                jq --arg n "$name" --arg p "$path" '. + {($n): $p}' "/tmp/ok-$sys.json" > /tmp/ok.tmp && mv /tmp/ok.tmp "/tmp/ok-$sys.json"
              else
                echo "::warning::$sys/$name closure not fully cached ($path) — dropped from manifest this cycle."
              fi
            done
            jq --arg s "$sys" --slurpfile m "/tmp/ok-$sys.json" '. + {($s): $m[0]}' /tmp/systems.json > /tmp/systems.tmp && mv /tmp/systems.tmp /tmp/systems.json
            echo "::endgroup::"
          done
          jq -n --arg rev "$SHA" --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile s /tmp/systems.json \
            '{rev: $rev, generated: $date, systems: $s[0]}' > /tmp/manifest.json
          jq . /tmp/manifest.json

      - name: Upload manifest artifact
        if: steps.manifest.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: container-manifest
          path: /tmp/manifest.json

  promote:
    name: "Move production tag → main"
    runs-on: ubuntu-latest
    # Only promote once the closure-completeness gate passes. `needs` makes this
    # job skip if verify-cache fails — hosts stay on the last good revision.
    needs: verify-cache
    # workflow_run fires regardless of conclusion; gate to success only.
    # workflow_dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Determine target SHA
        id: target
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.sha }}" ]; then
            SHA="${{ inputs.sha }}"
            echo "Using dispatch-input SHA: $SHA"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            echo "Using build-all head SHA: $SHA"
          else
            SHA=$(gh api repos/${{ github.repository }}/git/refs/heads/main --jq '.object.sha')
            echo "Using current main SHA: $SHA"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Move production tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          SHA="${{ steps.target.outputs.sha }}"
          # PATCH the tag ref. Force-move (PATCH with force=true) so we can
          # advance even when the new SHA isn't a fast-forward descendant —
          # rare, but happens after a force-push to main or a hotfix branch.
          gh api -X PATCH \
            "repos/${{ github.repository }}/git/refs/tags/production" \
            -f sha="$SHA" \
            -F force=true
          echo "✅ production → $SHA"
          {
            echo "## 🚀 Promoted to production"
            echo ""
            echo "- **SHA**: \`$SHA\`"
            echo "- **Trigger**: ${{ github.event_name }}"
            echo ""
            echo "Hosts running \`my.deploy.autoUpgrade\` will pick this up on their next cycle (default 04:00 ±30min)."
          } >> "$GITHUB_STEP_SUMMARY"

      # Advisory push signal: hosts running my.deploy.autoUpgrade.ntfy long-poll
      # this topic and start nixos-upgrade immediately instead of waiting for
      # the nightly timer. Best-effort by design — the timer remains the
      # catch-up path, so a missing secret, unreachable tunnel, or dropped
      # message only delays the deploy until 04:00, never blocks promotion.
      # The secret topic name is the access control (public, un-gated vhost);
      # message content is untrusted and ignored by subscribers.
      - name: Notify fleet via ntfy (best-effort)
        continue-on-error: true
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_DEPLOY_TOPIC }}
        run: |
          set -euo pipefail
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_DEPLOY_TOPIC secret not set — fleet picks this up on the nightly timer."
            exit 0
          fi
          curl -fsS --max-time 15 \
            -H "Title: production promoted" \
            -H "Tags: rocket" \
            -d "production → ${{ steps.target.outputs.sha }}" \
            "https://ntfy.kleinbem.dev/$NTFY_TOPIC"
          echo "📣 Fleet notified via ntfy — subscribed hosts upgrade now." >> "$GITHUB_STEP_SUMMARY"

      # Publish the container manifest generated by verify-cache as a rolling
      # release asset. Devices (my.services.container-updater) fetch it at
      # 03:00 and substitute the listed paths — no on-device eval. Best-effort:
      # if the manifest step failed, the previous asset stays in place and
      # containers simply hold their current closures for one more cycle.
      - name: Download manifest artifact
        id: dl-manifest
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: container-manifest
          path: /tmp

      - name: Publish container manifest
        if: steps.dl-manifest.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh release view container-manifest --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create container-manifest --repo "${{ github.repository }}" \
              --title "Container manifest (rolling)" \
              --notes "Rolling manifest consumed by my.services.container-updater. Regenerated on every production promotion." \
              --latest=false
          gh release upload container-manifest /tmp/manifest.json --clobber --repo "${{ github.repository }}"
          echo "📦 container manifest published for $(jq -r .rev /tmp/manifest.json)" >> "$GITHUB_STEP_SUMMARY"
