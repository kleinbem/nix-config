name: "Security Audit (vulnix)"

# Mirror of the meta-workspace security-audit workflow, building from
# nix-config directly. Runs alongside meta's copy during the meta-flake →
# nix-config root migration; meta's will be retired in 5f once this one is
# proven green for a full cycle.
#
# Weekly CVE scan of the nixos-nvme system closure with vulnix.
# Informational by design: reports findings, does not fail the build
# (nixpkgs always carries open CVEs). Tighten to fail-on-critical later.
on:
  schedule:
    # Wednesdays 06:00 UTC — midweek, off-peak, away from the Sunday update run.
    - cron: '0 6 * * 3'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vulnix:
    name: "Scan nixos-nvme closure for CVEs"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Nix fleet setup
        uses: ./.github/actions/nix-fleet-setup
        with:
          netbird-setup-key: ${{ secrets.NETBIRD_SETUP_KEY }}
          attic-token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Realize nixos-nvme closure (local store / cache)
        run: |
          nix build .#nixosConfigurations.nixos-nvme.config.system.build.toplevel \
            --impure --keep-going -L $NIX_OVERRIDES --out-link result

      - name: Run vulnix
        run: |
          set -uo pipefail
          TOP=$(readlink -f result)
          # vulnix exits non-zero when it finds CVEs; this scan is informational.
          nix run nixpkgs#vulnix -- --whitelist .github/vulnix-whitelist.toml "$TOP" > vulnix.txt 2>&1 || true
          {
            echo "## 🔒 vulnix CVE scan — nixos-nvme closure"
            echo ""
            echo '```'
            head -120 vulnix.txt
            echo '```'
            echo ""
            echo "_Full report in the \`vulnix-report\` artifact._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload vulnix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnix-report
          path: vulnix.txt
          if-no-files-found: ignore
