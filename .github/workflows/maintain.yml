name: Maintain Flake
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # daily at 03:00 UTC

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout nix-config
        uses: actions/checkout@v6.0.2
        with:
          path: nix-config
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ steps.app-token.outputs.token }}

      - name: Update flake inputs (excluding nix-secrets)
        run: |
          cd nix-config
          # nix-secrets is user-managed (rotated deliberately, not nightly)
          # AND private — CI has no PAT for it in Nix's access-tokens, so
          # fetching it here would 404. Discover remaining inputs dynamically
          # so new inputs are picked up automatically. jq is preinstalled on
          # ubuntu-latest.
          inputs=$(nix flake metadata --json | jq -r '
            .locks.nodes.root.inputs
            | keys[]
            | select(. != "nix-secrets")
          ' | tr '\n' ' ')
          if [ -z "$inputs" ]; then
            echo "::error::Could not discover flake inputs — refusing to run unbounded \`nix flake update\`."
            exit 1
          fi
          echo "Updating inputs: $inputs"
          nix flake update $inputs

      - name: Validate flake (eval-only — blocks a bad lock from landing)
        # Not `nix flake check --no-build`: devenv's task runner (inside the
        # devShell re-exported from nix-devshells) is fetched via IFD, and
        # --no-build refuses to realize that drv ("path …-source.drv is not
        # valid"). Plain eval may realize IFD, so eval every check and devShell
        # drvPath instead — checks include every host toplevel (host-*), so a
        # bad lock still can't land.
        run: |
          # nix-secrets is private and CI has no PAT in nix access-tokens, so
          # substitute the shared dummy stub (see .github/scripts/).
          ./nix-config/.github/scripts/setup-dummy-secrets.sh
          cd nix-config
          eval_drv() {
            echo "eval $1"
            nix eval "$1" \
              --override-input nix-secrets /tmp/dummy-secrets > /dev/null
          }
          attr_names() {
            nix eval "$1" --apply builtins.attrNames --json \
              --override-input nix-secrets /tmp/dummy-secrets | jq -r '.[]'
          }
          for system in x86_64-linux aarch64-linux; do
            for check in $(attr_names ".#checks.$system"); do
              # host-phone (nix-on-droid) can never eval purely: upstream pins
              # its cross-compiled proot-static as a raw /nix/store string,
              # which types.package coerces via builtins.storePath — rejected
              # in pure eval (nix-on-droid requires --impure + its cachix).
              [ "$check" = "host-phone" ] && continue
              eval_drv ".#checks.$system.\"$check\".drvPath"
            done
          done
          for shell in $(attr_names ".#devShells.x86_64-linux"); do
            eval_drv ".#devShells.x86_64-linux.\"$shell\".drvPath"
          done

      - name: Commit lockfile changes via GitHub API (verified signature)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          cd nix-config
          # Branch protection on main requires verified signatures. CI runners
          # cannot use the YubiKey, so we push via the GitHub Contents API —
          # commits created through the API get a web-flow signature that
          # satisfies the protection rule.
          if git diff --quiet flake.lock; then
            echo "flake.lock unchanged — nothing to commit."
            exit 0
          fi

          CURRENT_SHA=$(gh api "repos/${GH_REPO}/contents/flake.lock?ref=${BRANCH}" --jq .sha)

          # Build the request body via stdin — passing the base64 content as a
          # CLI arg via `-f content=…` blows past ARG_MAX for non-trivial
          # lockfiles.
          base64 -w0 flake.lock > /tmp/flake-lock.b64
          jq -n \
            --arg msg "chore: update flake.lock (auto)" \
            --arg branch "${BRANCH}" \
            --arg sha "${CURRENT_SHA}" \
            --rawfile content /tmp/flake-lock.b64 \
            '{message: $msg, branch: $branch, sha: $sha, content: $content}' \
          | gh api --method PUT "repos/${GH_REPO}/contents/flake.lock" --input -
