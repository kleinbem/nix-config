name: Maintain Flake
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # daily at 03:00 UTC

jobs:
  update:
    runs-on: self-hosted
    env:
      DIRENV_CACHE: $HOME/.direnv/cache
    steps:
      - name: Checkout nix-config
        uses: actions/checkout@v6.0.2
        with:
          path: nix-config

      - name: Checkout nix-secrets (shallow)
        uses: actions/checkout@v6.0.2
        with:
          repository: kleinbem/nix-secrets
          token: ${{ secrets.GH_PAT }}
          path: nix-secrets
          fetch-depth: 1

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-store-${{ runner.os }}-${{ hashFiles('nix-config/**') }}

      - name: Cache nix-secrets directory
        uses: actions/cache@v4
        with:
          path: nix-secrets
          key: nix-secrets-${{ runner.os }}-${{ hashFiles('nix-secrets/**') }}

      - name: Set up Nix
        uses: cachix/install-nix-action@v31.10.6

      - name: Override and lock nix-secrets
        run: |
          cd nix-config
          nix flake lock --override-input nix-secrets ../nix-secrets

      - name: Update flake inputs
        run: |
          cd nix-config
          nix flake update

      - name: Commit lockfile changes via GitHub API (verified signature)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          cd nix-config
          # Branch protection on main requires verified signatures. CI runners
          # cannot use the YubiKey, so we push the change via the GitHub Contents
          # API instead — commits created through the API get a web-flow signature
          # that satisfies the protection rule.
          if git diff --quiet flake.lock; then
            echo "flake.lock unchanged — nothing to commit."
            exit 0
          fi

          # Look up the current blob sha so the API accepts the PUT.
          CURRENT_SHA=$(gh api "repos/${GH_REPO}/contents/flake.lock?ref=${BRANCH}" --jq .sha)
          CONTENT_B64=$(base64 -w0 flake.lock)

          gh api --method PUT "repos/${GH_REPO}/contents/flake.lock" \
            -f message="chore: update flake.lock (auto)" \
            -f branch="${BRANCH}" \
            -f sha="${CURRENT_SHA}" \
            -f content="${CONTENT_B64}"
