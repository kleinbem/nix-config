name: 'Nix fleet setup'
description: 'Shared CI preamble for the nix-config flake: installs Nix, sets sub-flake overrides to github: refs, and (optionally) brings up NetBird + Attic for builds that need to push to the binary cache.'

inputs:
  netbird-setup-key:
    description: 'NetBird setup key (only required when enable-cache=true).'
    required: false
    default: ''
  attic-token:
    description: 'Attic push token (only required when enable-cache=true).'
    required: false
    default: ''
  enable-cache:
    description: 'Bring up NetBird, trust the internal Caddy CA, and configure the Attic cache. Set to "false" for matrix-gen / eval-only jobs that do not push.'
    required: false
    default: 'true'
  configure-auto-gc:
    description: 'Configure Nix auto-gc (min-free / max-free) — recommended for big closure builds, skip for small jobs.'
    required: false
    default: 'false'
  free-disk-space:
    description: 'Reclaim ~20 GiB by deleting preinstalled toolchains. Set true for big-closure jobs (NixOS System); leave false for containers/devshells/packages — saves ~30s of overhead per job.'
    required: false
    default: 'false'
  netbird:
    description: 'Bring up the NetBird WireGuard tunnel for Attic push. Set true only when the closure NAR may exceed Cloudflare''s 100 MiB upload limit (NixOS System). Direct HTTPS push is ~15-20s faster and works fine for smaller NARs.'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    # Reclaim disk for the Nix store by deleting preinstalled toolchains.
    # endersonmenezes/free-disk-space@v3 is the actively-maintained successor
    # to the LVM-juggling easimon/maximize-build-space — same headroom, no
    # mount surgery (which silently lost log output on big closures).
    # Reference: carpenike/nix-config and colemickens/nixcfg.
    - name: Free disk space
      if: inputs.free-disk-space == 'true'
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: 'true'
        remove_dotnet: 'true'
        remove_haskell: 'true'
        remove_tool_cache: 'true'
        remove_swap: 'true'
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: 'true'
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle /usr/lib/jvm /home/runner/.rust /usr/local/.ghcup"
        rm_cmd: "rmz"
        rmz_version: "3.1.1"

    - name: Set up dummy secrets
      shell: bash
      run: ./.github/scripts/setup-dummy-secrets.sh

    - name: Set Nix input overrides
      shell: bash
      run: |
        # nix-config CI uses github: refs for sibling sub-flakes (matches the
        # existing ci.yml pattern). Each build evaluates against whatever's on
        # the sibling's main branch — same semantics as the per-sub-flake CIs.
        echo "NIX_OVERRIDES=\
          --override-input nix-secrets /tmp/dummy-secrets \
          --override-input nix-devshells github:kleinbem/nix-devshells \
          --override-input nix-hardware github:kleinbem/nix-hardware \
          --override-input nix-hardware/nix-devshells github:kleinbem/nix-devshells \
          --override-input nix-packages github:kleinbem/nix-packages \
          --override-input nix-packages/nix-devshells github:kleinbem/nix-devshells \
          --override-input nix-presets github:kleinbem/nix-presets \
          --override-input nix-presets/nix-devshells github:kleinbem/nix-devshells \
          --override-input nix-presets/nix-packages github:kleinbem/nix-packages \
          --override-input nix-presets/nix-packages/nix-devshells github:kleinbem/nix-devshells \
          --override-input nix-templates github:kleinbem/nix-templates \
          --override-input nix-templates/nix-devshells github:kleinbem/nix-devshells" >> "$GITHUB_ENV"

    - name: Install Nix (Determinate)
      uses: DeterminateSystems/determinate-nix-action@v3
      with:
        extra-conf: |
          sandbox = false
          trusted-users = root runner

    - name: Configure Nix Auto-GC
      if: inputs.configure-auto-gc == 'true'
      shell: bash
      run: |
        echo "min-free = 1073741824" | sudo tee -a /etc/nix/nix.conf
        echo "max-free = 2147483648" | sudo tee -a /etc/nix/nix.conf
        sudo systemctl restart nix-daemon

    - name: Setup NetBird VPN
      if: inputs.enable-cache == 'true' && inputs.netbird == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v netbird &> /dev/null; then
          # Tolerate "Init already exists" errors from install.sh: hosted
          # runner images sometimes ship the systemd unit but not the binary,
          # which makes install.sh exit non-zero even when the binary install
          # itself succeeds. We re-check below and fail loud if it really didn't.
          curl -fsSL https://pkgs.netbird.io/install.sh | sh || true
          sudo systemctl daemon-reload
        fi
        if ! command -v netbird &> /dev/null; then
          echo "::error::NetBird install failed — binary not in PATH after install.sh"
          exit 1
        fi
        # No `|| true` on `netbird up` — if NetBird can't come up, the attic push
        # will eventually 413 on a >100 MiB NAR via Cloudflare anyway. Fail loud.
        sudo systemctl start netbird
        sudo netbird up --setup-key "${{ inputs.netbird-setup-key }}"

    - name: Route Attic over NetBird (fail-closed)
      if: inputs.enable-cache == 'true' && inputs.netbird == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Resolution: prefer the NetBird DNS zone (infra/netbird/dns.tf — one
        # tofu-managed pointer instead of an IP baked into this file; the
        # runner's systemd-resolved learns NetBird's resolver from `netbird
        # up`). A mesh IP (100.117.0.0/16) proves the zone answered. Anything
        # else (public DNS returns the Cloudflare tunnel edge, whose 100 MiB
        # NAR cap breaks pushes) falls back to a static /etc/hosts pin — warn
        # so we notice the DNS path regressing, but don't fail the build.
        # The zone reaches a freshly-joined peer via the network-map sync, which
        # can lag `netbird up` by several seconds — retry before falling back
        # (first observed run: fallback fired 8s after join with the public IP).
        resolved=""
        for i in {1..6}; do
          dns_answer="$(getent ahostsv4 cache.kleinbem.dev | awk '{print $1; exit}' || true)"
          if [[ "$dns_answer" == 100.117.* ]]; then
            resolved="$dns_answer"
            echo "cache.kleinbem.dev resolves via NetBird DNS: $resolved (attempt $i)"
            break
          fi
          sleep 5
        done
        if [ -z "$resolved" ]; then
          resolved="100.117.146.201"
          echo "::warning::cache.kleinbem.dev did not resolve to a mesh IP after 30s (last answer: '${dns_answer:-nothing}') — pinning $resolved in /etc/hosts. NetBird DNS zone may be broken or not reaching runner peers."
          # Diagnostics for the retirement decision — what DID the runner's
          # resolver think, and did NetBird register its DNS at all?
          resolvectl status 2>/dev/null | grep -iA2 "netbird\|wt0" | head -10 || true
          resolvectl query cache.kleinbem.dev 2>&1 | head -3 || true
          echo "$resolved cache.kleinbem.dev" | sudo tee -a /etc/hosts
        fi
        # Verify the route to the Attic IP actually goes through NetBird's
        # `wt0` interface. Without this check, a silently-failed `netbird up`
        # would let DNS fall back to Cloudflare and the attic push would 413
        # on big NARs. Cheaper to fail here, before the build.
        route="$(ip route get "$resolved")"
        echo "$route"
        if ! echo "$route" | grep -q 'dev wt0'; then
          echo "::error::NetBird route to cache.kleinbem.dev is not via wt0 — bailing before the build."
          sudo netbird status || true
          exit 1
        fi
        
        echo "Waiting for NetBird peer connectivity to cache.kleinbem.dev..."
        connected=false
        for i in {1..15}; do
          if ping -c 1 -W 1 "$resolved" &>/dev/null; then
            echo "Connectivity established."
            connected=true
            break
          fi
          sleep 2
        done
        
        if [ "$connected" = "false" ]; then
          echo "::error::Could not ping cache.kleinbem.dev via NetBird after 30 seconds."
          sudo netbird status || true
          exit 1
        fi

    - name: Trust internal Caddy CA
      if: inputs.enable-cache == 'true'
      shell: bash
      run: |
        sudo cp pki/caddy-root.crt /usr/local/share/ca-certificates/caddy-root.crt
        sudo update-ca-certificates
        echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"
        echo "NIX_SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"

    - name: Setup Attic Cache
      # Run whenever a token is available — NOT only when pushing. PR builds
      # (enable-cache=false) still need Attic as a READ substituter: the custom
      # linux-rpi kernel/modules are absent from cache.nixos.org, so without
      # Attic configured, nix-fast-build --skip-cached treats them as uncached
      # and recompiles the modules from source (~2h45m) on every PR. As a read
      # substituter this is resolved over the public Cloudflare tunnel (no
      # NetBird): --skip-cached's narinfo queries are tiny, so a PR that doesn't
      # change a host closure finds the toplevel cached and skips it entirely.
      # NetBird + push stay gated on enable-cache (non-PR) below. (Empty token on
      # fork PRs → step skips → falls back to building, same as before.)
      if: inputs.attic-token != ''
      uses: ryanccn/attic-action@v0
      with:
        endpoint: https://cache.kleinbem.dev/
        cache: system
        token: ${{ inputs.attic-token }}
        # Setup-ONLY: configure Attic as a substituter + auth, but do NOT run
        # the action's default post-job push. That push uploads the whole store
        # diff — including every path Nix *substituted* from cache.nixos.org to
        # assemble the closure — re-mirroring upstream into our private cache for
        # no benefit (devices already get those from cache.nixos.org) and bloating
        # it over time. The real push is done by `nix-fast-build --attic-cache
        # system --skip-cached` in build-all.yaml, which pushes ONLY the paths it
        # actually built (the non-upstream ones: custom kernels, custom packages,
        # host-specific config). Net: Attic holds exactly what cache.nixos.org
        # can't, and the two together cover every closure. The promote-production
        # "verify-cache" gate proves that union is complete before any host is
        # told to upgrade, so leaning Attic out here can't cause a device to build.
        skip-push: 'true'
